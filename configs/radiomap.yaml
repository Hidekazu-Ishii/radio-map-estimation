# 電波マップ生成の実験パラメータ

n_trials: 10
master_seed: 42

# 基本固定パラメータ
tx_power_dbm: 43.0
bs_height_m: 40.0
ue_height_m: 1.5
n_sample: 400

# 実験条件 (各conditionでn_trials分のデータを生成)
locations:
  - [35.67124593733176, 139.76434020375822]  # 東京駅周辺
#  - [35.68969465361269, 139.69203836179247]  # 新宿都庁周辺
#  - [40.75772451840521, -73.98496853268092]  # ニューヨーク・タイムズスクエア周辺
#  - [48.84279253517007, 2.292219946062063]  # パリ15区周辺
#  - [51.49791799727547, -0.13585643420673757]  # westminster周辺

conditions:
  # 周波数帯域ごとの条件
  - frequency_hz: 3.5e+9
    bs_intensity: 0.000024   # 6 / (500^2)
    sigma_shadow_db: 8.0
    corr_distance: 50.0
    noise_std_db: 2.0

  - frequency_hz: 3.0e+10
    bs_intensity: 0.000024
    sigma_shadow_db: 8.0
    corr_distance: 50.0
    noise_std_db: 2.0
