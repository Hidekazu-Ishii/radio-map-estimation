# GeoDataFrame の出力フォーマット
output_format: "geoparquet"   # "geoparquet" or "geojson"

# エリアの一辺の長さ [m]（全 city 共通）
# 3次メッシュ 1枚 ≈ 緯度30秒 × 経度45秒 ≈ 1km²
# bbox はこの値の 1/5 のマージンを加えて取得される
area_size_m: 1000.0
margin_m: 200.0

# bldg_mask のセルサイズ [m]
bldg_cell_size_m: 1.0
