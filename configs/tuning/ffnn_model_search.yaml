# FFNNLos パスロスモデル ハイパーパラメータチューニング設定
# シャドウイング推定は含めない（パスロスモデル単体のチューニング）

run_id: "tune_v1"

# チューニング用に固定する条件（train_size, test_size は全試行・全組み合わせ共通）
train_size: 512
test_size: 100 # train以外からランダムに100点を評価用に固定
n_trials: 5 # 同一ハイパラ設定に対する乱数シード違いの繰り返し回数
master_seed: 1

# 探索空間（グリッドサーチ = 全組み合わせの直積を総当たり）
search_space:
  n_layers: [1, 2, 3]
  n_neurons: [50, 100, 150]
  lr: [1.0e-3, 1.0e-2]
  batch_size: [128, 256, 512]
  n_epochs: [500]
