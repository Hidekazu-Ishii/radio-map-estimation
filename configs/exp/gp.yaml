# 実験設定
run_id: "001_baseline" # 連番 + 変更点説明

# 学習点数
train_size: [512, 1024]

# 評価点数
test_size: 1000

# 繰り返し実験の設定
n_trials: 2
master_seed: 42 # trial_idx=i に対して master_seed + i を使用

# パスロスモデル
pathloss_model: ffnn # "ci" | "fi" | "ffnn" | "ffnn_los"

# シャドウイングモデル
shadowing_model: gp
kernel: gudmundson

# ffnn / ffnn_los を選択した場合のみ有効
# ハイパーパラメータは静的に書かず、以下の run_id でチューニング済みの結果
# (outputs/tuning_analysis/ffnn_los/best_{ffnn_tuning_run_id}.csv) を
# (city_dir, mesh_code, freq_ghz) ごとに参照する
ffnn_tuning_run_id: "tune_v1"

# GP ハイパーパラメータ（定常カーネル共通）
gp:
  sigma_n_2_init: 4.0 # 観測ノイズ分散の初期値 [dB²]
  sigma_n_2_min: 1.0 # 観測ノイズ分散の下限 [dB²]
  sigma_n_2_max: 9.0 # 観測ノイズ分散の上限 [dB²]
  n_restarts: 10 # マルチスタート試行数
  max_iter: 500 # L-BFGS-B 最大イテレーション数
  ftol: 1.0e-9 # L-BFGS-B 関数値収束閾値
  gtol: 1.0e-3 # L-BFGS-B 勾配収束閾値

# Gudmundson カーネルハイパーパラメータ
gudmundson:
  sigma_2_init: 50.0 # シャドウイング分散の初期値 [dB²]
  d_cor_init: 50.0 # 相関距離の初期値 [m]
